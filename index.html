<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aris - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #07121D;
    --bg-secondary: #182836;
    --green: #42E37C;
    --blue: #37D5FF;
    --cyan: #00FFC8;
    --white: #F8FAFC;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg-primary);
    color: var(--white);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo {
    width: 220px;
    max-width: 70%;
    height: auto;
    margin: 0 auto 32px;
    display: block;
  }
  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    opacity: 0.8;
    margin: 0 0 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    margin: 0 0 18px;
    background: var(--bg-secondary);
    border: 1px solid rgba(248, 250, 252, 0.12);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 400;
    transition: border-color 0.2s ease;
  }
  input:focus {
    outline: none;
    border-color: var(--blue);
  }
  button {
    width: 100%;
    padding: 13px;
    margin-top: 6px;
    border: 0;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--green), var(--blue), var(--cyan));
    color: var(--bg-primary);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s ease, box-shadow 0.2s ease;
  }
  button:hover:not(:disabled) {
    box-shadow: 0 0 24px rgba(55, 213, 255, 0.35);
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .err {
    color: #ff8080;
    font-size: 13px;
    font-weight: 400;
    min-height: 18px;
    margin: -8px 0 16px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/logo-lockup.png" alt="Aris Vitals">

    <p id="err" class="err"></p>
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" required autocomplete="username">
      <label for="password">Senha</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit" id="submitBtn">Entrar</button>
    </form>
  </div>

  <script>
    // Ponte OAuth: esta pagina estatica (GitHub Pages) coleta a credencial e chama a
    // Edge Function do Supabase via JSON (Edge Functions nao servem HTML - ver ADR-004 revisado).
    const BRIDGE_URL = "https://ejhourrhndkfgksliusl.supabase.co/functions/v1/oauth-bridge/login";

    const params = new URLSearchParams(window.location.search);
    const clientId = params.get("client_id");
    const redirectUri = params.get("redirect_uri");
    const state = params.get("state") || "";

    const form = document.getElementById("loginForm");
    const errEl = document.getElementById("err");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Entrando...";

      try {
        const res = await fetch(BRIDGE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            client_id: clientId,
            redirect_uri: redirectUri,
            state: state,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error === "invalid_credentials"
            ? "E-mail ou senha invalidos."
            : "Erro ao entrar. Tente novamente.";
          btn.disabled = false;
          btn.textContent = "Entrar";
          return;
        }
        window.location.href = data.redirect_to;
      } catch (err) {
        errEl.textContent = "Erro de conexao. Tente novamente.";
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
