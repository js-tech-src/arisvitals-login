<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aris - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #07121D;
    --bg-secondary: #182836;
    --green: #42E37C;
    --blue: #37D5FF;
    --cyan: #00FFC8;
    --white: #F8FAFC;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg-primary);
    color: var(--white);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo {
    width: 220px;
    max-width: 70%;
    height: auto;
    margin: 0 auto 32px;
    display: block;
  }
  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    opacity: 0.8;
    margin: 0 0 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    margin: 0 0 18px;
    background: var(--bg-secondary);
    border: 1px solid rgba(248, 250, 252, 0.12);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 400;
    transition: border-color 0.2s ease;
  }
  input:focus {
    outline: none;
    border-color: var(--blue);
  }
  button {
    width: 100%;
    padding: 13px;
    margin-top: 6px;
    border: 0;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--green), var(--blue), var(--cyan));
    color: var(--bg-primary);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s ease, box-shadow 0.2s ease;
  }
  button:hover:not(:disabled) {
    box-shadow: 0 0 24px rgba(55, 213, 255, 0.35);
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .err {
    color: #ff8080;
    font-size: 13px;
    font-weight: 400;
    min-height: 18px;
    margin: -8px 0 16px;
  }
  .google-btn {
    width: 100%;
    padding: 0;
    margin-top: 14px;
    height: 44px;
    border: 1px solid #dadce0;
    border-radius: 10px;
    background: #ffffff;
    color: #3c4043;
    font-family: 'Sora', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: box-shadow 0.2s ease, background 0.2s ease;
  }
  .google-btn:hover:not(:disabled) {
    background: #f8f9fa;
    box-shadow: 0 1px 6px rgba(0,0,0,0.25);
  }
  .google-btn:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .google-btn svg { flex-shrink: 0; }
  #googleErr {
    margin: 8px 0 0;
    color: #FF9B9B;
  }
  .unauthorized-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 128, 128, 0.12);
    border: 1px solid rgba(255, 128, 128, 0.35);
  }
  .unauthorized-title {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 10px;
    color: var(--white);
  }
  .unauthorized-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    opacity: 0.75;
    line-height: 1.5;
    margin: 0 0 24px;
  }
  .unauthorized-contact {
    display: inline-block;
    padding: 12px 20px;
    border-radius: 10px;
    background: var(--bg-secondary);
    border: 1px solid rgba(248, 250, 252, 0.12);
    color: var(--cyan);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="card" id="loginCard" style="display:none">
    <img class="logo" src="assets/logo-lockup.png" alt="Aris Vitals">

    <p id="err" class="err"></p>
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" required autocomplete="username">
      <label for="password">Senha</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit" id="submitBtn">Entrar</button>
    </form>

    <button type="button" id="googleBtn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      <span id="googleBtnText">Continuar com o Google</span>
    </button>
    <p id="googleErr" class="err"></p>
  </div>

  <div class="card" id="unauthorizedCard" style="display:none">
    <img class="logo" src="assets/logo-lockup.png" alt="Aris Vitals">
    <div class="unauthorized-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" stroke="#ff8080" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="unauthorized-title">Acesso não autorizado</p>
    <p class="unauthorized-text">Este link não é válido para acessar o Aris. Se você acredita que isso é um erro, procure o administrador do Aris.</p>
    <a class="unauthorized-contact" href="mailto:jstechltda@gmail.com">jstechltda@gmail.com</a>
  </div>

  <script>
    // Ponte OAuth: esta pagina estatica (GitHub Pages) coleta a credencial e chama a
    // Edge Function do Supabase via JSON (Edge Functions nao servem HTML - ver ADR-004 revisado).
    const BRIDGE_URL = "https://ejhourrhndkfgksliusl.supabase.co/functions/v1/oauth-bridge/login";
    const GOOGLE_CALLBACK_URL = "https://ejhourrhndkfgksliusl.supabase.co/functions/v1/oauth-bridge/google-callback";
    const UNAUTHORIZED_LOG_URL = "https://ejhourrhndkfgksliusl.supabase.co/functions/v1/oauth-bridge/unauthorized-attempt";
    const SUPABASE_AUTH_URL = "https://ejhourrhndkfgksliusl.supabase.co/auth/v1/authorize";
    const PAGE_URL = "https://js-tech-src.github.io/arisvitals-login/";

    // client_id nao e segredo (so o client_secret e) - mesma logica de validacao que o
    // oauth-bridge faz no /authorize, replicada aqui so pra dar uma mensagem de erro
    // decente em vez do JSON cru, quando alguem acessa a pagina fora do fluxo real.
    const KNOWN_CLIENT_ID = "lLjCSw10ka81DnCWZ55aOw";
    const ALLOWED_REDIRECT_HOSTS = ["chat.openai.com", "chatgpt.com"];

    function isAllowedRedirect(uri) {
      try {
        return ALLOWED_REDIRECT_HOSTS.includes(new URL(uri).hostname);
      } catch {
        return false;
      }
    }

    let loginCardInitialized = false;
    let clientId = null;
    let redirectUri = null;
    let hasGoogleToken = false;

    // ADR-018 (fix revisado): a primeira versao deste fix forcava window.location.reload()
    // quando pageshow disparava com event.persisted=true, pra evitar que o bfcache do
    // navegador restaurasse o card de erro de uma tentativa anterior. Isso causou uma
    // regressao pior: alguns navegadores/webviews (incluindo o embutido do ChatGPT) reportam
    // persisted=true ja no carregamento inicial, gerando um loop de reload infinito (pagina
    // fica carregando pra sempre, sem nunca chegar a chamar o oauth-bridge). Correcao: em vez
    // de recarregar a pagina, so reexecuta a logica de decisao (mostra login ou fallback) com
    // os parametros atuais da URL - sem navegacao nova, sem risco de loop.
    function renderAuthState() {
      const params = new URLSearchParams(window.location.search);
      clientId = params.get("client_id");
      redirectUri = params.get("redirect_uri");
      hasGoogleToken = window.location.hash.includes("access_token");

      // Fluxo de volta do Google traz o token no fragmento, sem repetir client_id/redirect_uri
      // na querystring (eles ja foram validados quando a pagina redirecionou pro Google) -
      // nesse caso so confiamos no que esta salvo, sem re-checar aqui.
      const isAuthorized = hasGoogleToken || (clientId === KNOWN_CLIENT_ID && isAllowedRedirect(redirectUri || ""));

      const unauthorizedCard = document.getElementById("unauthorizedCard");
      const loginCard = document.getElementById("loginCard");

      if (!isAuthorized) {
        loginCard.style.display = "none";
        unauthorizedCard.style.display = "block";
        fetch(UNAUTHORIZED_LOG_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            client_id: clientId,
            redirect_uri: redirectUri,
            reason: !clientId ? "missing_client_id"
              : clientId !== KNOWN_CLIENT_ID ? "unknown_client_id"
              : "disallowed_redirect_uri",
          }),
        }).catch(() => {});
      } else {
        unauthorizedCard.style.display = "none";
        loginCard.style.display = "block";
        if (!loginCardInitialized) {
          loginCardInitialized = true;
          initLoginCard();
        }
      }
    }

    renderAuthState();
    window.addEventListener("pageshow", renderAuthState);

    const params = new URLSearchParams(window.location.search);
    const state = params.get("state") || "";

    function initLoginCard() {
      const form = document.getElementById("loginForm");
      const errEl = document.getElementById("err");
      const btn = document.getElementById("submitBtn");
      const googleBtn = document.getElementById("googleBtn");
      const googleBtnText = document.getElementById("googleBtnText");
      const googleErrEl = document.getElementById("googleErr");

      // Passo 4 (ARIS-28): se voltamos do redirect do Google, o Supabase entrega a sessao
      // no fragmento da URL (#access_token=...). Capturamos aqui e trocamos por um "code"
      // interno do nosso proprio oauth-bridge, igual ao fluxo de senha.
      (async () => {
        if (!hasGoogleToken) return;
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = hashParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token");
        if (!accessToken) return;

        googleBtn.disabled = true;
        googleBtnText.textContent = "Entrando...";
        try {
          const res = await fetch(GOOGLE_CALLBACK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              access_token: accessToken,
              refresh_token: refreshToken,
              client_id: clientId,
              redirect_uri: redirectUri,
              state: state,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            googleErrEl.textContent = "Erro ao entrar com Google. Tente novamente.";
            googleBtn.disabled = false;
            googleBtnText.textContent = "Continuar com o Google";
            return;
          }
          window.location.href = data.redirect_to;
        } catch (err) {
          googleErrEl.textContent = "Erro de conexao. Tente novamente.";
          googleBtn.disabled = false;
          googleBtnText.textContent = "Continuar com o Google";
        }
      })();

      googleBtn.addEventListener("click", () => {
        // Preserva client_id/redirect_uri/state passando pelo Supabase e voltando pra esta
        // mesma pagina, que ja sabe processar o fragmento com o token (bloco acima).
        const back = new URL(PAGE_URL);
        if (clientId) back.searchParams.set("client_id", clientId);
        if (redirectUri) back.searchParams.set("redirect_uri", redirectUri);
        if (state) back.searchParams.set("state", state);
        const dest = new URL(SUPABASE_AUTH_URL);
        dest.searchParams.set("provider", "google");
        dest.searchParams.set("redirect_to", back.toString());
        window.location.href = dest.toString();
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.textContent = "";
        btn.disabled = true;
        btn.textContent = "Entrando...";

        try {
          const res = await fetch(BRIDGE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("email").value,
              password: document.getElementById("password").value,
              client_id: clientId,
              redirect_uri: redirectUri,
              state: state,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            errEl.textContent = data.error === "invalid_credentials"
              ? "E-mail ou senha invalidos."
              : "Erro ao entrar. Tente novamente.";
            btn.disabled = false;
            btn.textContent = "Entrar";
            return;
          }
          window.location.href = data.redirect_to;
        } catch (err) {
          errEl.textContent = "Erro de conexao. Tente novamente.";
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      });
    }
  </script>
</body>
</html>
