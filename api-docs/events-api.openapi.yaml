openapi: 3.1.0
info:
  title: Aris Events API (PoC)
  version: 1.4.0
servers:
  - url: https://ejhourrhndkfgksliusl.supabase.co/functions/v1/events-api
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check publico para monitoramento externo (UptimeRobot, ARIS-80). Sem auth, nao toca no banco.
      responses:
        "200":
          description: Servico respondendo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: events-api }
  /create:
    post:
      operationId: createEvent
      summary: Registra um evento de saude (peso, alimentacao, agua, exercicio, suplemento ou exame)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_datetime, domain, metric, value]
              properties:
                event_datetime:
                  type: string
                  description: "Data e hora do evento, formato ISO (ex: 2026-07-10T08:30:00)"
                domain:
                  type: string
                  enum: [peso, alimentacao, agua, exercicio, suplemento, exame]
                item:
                  type: string
                  description: "Nome legivel do item (ex: Balanca, Peito de frango)"
                metric:
                  type: string
                  description: "Chave da metrica (ex: peso_kg, kcal, volume_ml)"
                value:
                  type: string
                unit:
                  type: string
                source:
                  type: string
                  enum: [imagem_balanca, imagem_exercicio, texto_usuario, contexto_inicial, rotulo_produto, documento_exame, migracao_historica]
                confidence:
                  type: string
                  enum: [alta, media, baixa]
                grupo_substituicao:
                  type: string
                refeicao_tipo:
                  type: string
                  description: "Quando domain=alimentacao: nome da refeicao do protocolo vigente (ex: Desjejum), usado no calculo de aderencia"
                contexto:
                  type: string
                  description: "Motivo/circunstancia opcional anexado pelo paciente (ex: 'era festa', 'trabalhei da rua')"
      responses:
        "201":
          description: Evento criado
  /list:
    get:
      operationId: listEvents
      summary: Lista os eventos mais recentes do paciente autenticado
      parameters:
        - name: domain
          in: query
          required: false
          schema:
            type: string
            enum: [peso, alimentacao, agua, exercicio, suplemento, exame]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista de eventos
  /create-batch:
    post:
      operationId: createEventsBatch
      summary: Registra varios eventos de uma vez (exames com muitas metricas, diario alimentar completo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [event_datetime, domain, metric, value]
                    properties:
                      event_datetime:
                        type: string
                      domain:
                        type: string
                        enum: [peso, alimentacao, agua, exercicio, suplemento, exame]
                      item:
                        type: string
                      metric:
                        type: string
                      value:
                        type: string
                      unit:
                        type: string
                      source:
                        type: string
                        enum: [imagem_balanca, imagem_exercicio, texto_usuario, contexto_inicial, rotulo_produto, documento_exame, migracao_historica]
                      confidence:
                        type: string
                        enum: [alta, media, baixa]
                      grupo_substituicao:
                        type: string
                      refeicao_tipo:
                        type: string
                      contexto:
                        type: string
      responses:
        "201":
          description: Lote criado (retorna created + events)
  /documents/upload:
    post:
      operationId: uploadDocument
      summary: Envia um documento medico (receita, exame, plano) para armazenamento seguro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_base64, filename, content_type, tipo_documento]
              properties:
                file_base64:
                  type: string
                  description: "Conteudo do arquivo codificado em base64"
                filename:
                  type: string
                content_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp, image/heic, application/pdf]
                tipo_documento:
                  type: string
                  enum: [receita, exame, plano_alimentar, plano_treino, outro]
                professional_id:
                  type: integer
                  description: "ID do profissional em reference_healthcare_professionals, se identificado"
                clinic_id:
                  type: integer
                  description: "ID da clinica/laboratorio em reference_clinics, se identificado"
      responses:
        "201":
          description: Documento gravado (storage + patient_documents)
  /reference/products/register:
    post:
      operationId: registerReferenceProduct
      summary: Cadastra produto de referencia (catalogo global) com tabela nutricional (ARIS-81, ADR-016)
      description: >
        Catalogo global (sem patient_id) - qualquer paciente autenticado pode cadastrar um produto
        que fica disponivel para todos. Cadastro pode ser feito isoladamente ou apenas com o nome
        (a tabela nutricional pode ser completada depois). O campo table_complete e calculado pelo
        servidor: true somente quando calorias_kcal, proteinas_g, carboidratos_g e gorduras_totais_g
        estao todos preenchidos. Esta rota nunca e pre-requisito para registrar um evento de alimentacao.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome_produto]
              properties:
                nome_produto:
                  type: string
                  example: "Frango grelhado Seara"
                marca:
                  type: string
                categoria:
                  type: string
                tipo_subtipo:
                  type: string
                grupo_substituicao:
                  type: string
                ean:
                  type: string
                porcao_quantidade:
                  type: number
                porcao_unidade:
                  type: string
                  example: "g"
                porcoes_por_embalagem:
                  type: number
                calorias_kcal:
                  type: number
                carboidratos_g:
                  type: number
                acucares_totais_g:
                  type: number
                acucares_adicionados_g:
                  type: number
                proteinas_g:
                  type: number
                gorduras_totais_g:
                  type: number
                gorduras_saturadas_g:
                  type: number
                gorduras_trans_g:
                  type: number
                fibra_g:
                  type: number
                sodio_mg:
                  type: number
                vitaminas_minerais:
                  type: string
                outros_nutrientes:
                  type: string
                pct_vd_relevante:
                  type: string
                ingredientes:
                  type: string
                alergenicos:
                  type: string
                modo_uso_dose:
                  type: string
                observacoes_fonte:
                  type: string
      responses:
        "201":
          description: Produto registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_id:
                    type: integer
                  table_complete:
                    type: boolean
                  product:
                    type: object
        "400":
          description: Campo obrigatorio ausente (nome_produto)
        "401":
          description: Token ausente ou invalido
