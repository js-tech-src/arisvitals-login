<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="halo-gradient" x1="20" y1="160" x2="180" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#42E37C"/>
      <stop offset="50%" stop-color="#37D5FF"/>
      <stop offset="100%" stop-color="#00FFC8"/>
    </linearGradient>
  </defs>
  <!-- Halo: circulo luminoso atras do simbolo, gradiente oficial Verde Vital -> Azul Clinico -> Ciano -->
  <circle cx="100" cy="98" r="82" stroke="url(#halo-gradient)" stroke-width="5" opacity="0.9"/>
  <!-- Simbolo: "A" estilizado, sem travessao (nunca redesenhar) -->
  <path d="M 100 18 L 188 182 L 150 182 L 100 88 L 50 182 L 12 182 Z" fill="#F8FAFC"/>
</svg>
